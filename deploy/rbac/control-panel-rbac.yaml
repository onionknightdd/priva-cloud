# RBAC for control-panel: provision AgentTenant CRs + read their status (EPP wake)
# + scale a deployment to zero (admin terminate).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: priva-control-panel
  namespace: priva-cloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: priva-control-panel
  namespace: priva-cloud
rules:
  - apiGroups: ["priva.io"]
    resources: ["agenttenants", "agenttenants/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Admin control-plane web terminal: exec a shell into control-plane pods
  # (control-panel / operator / data-spine) via the k8s API. Admin-gated, audited.
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  # Read live agent-runner CPU/memory (metrics-server) for the Resource Quota view.
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: priva-control-panel
  namespace: priva-cloud
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: priva-control-panel
subjects:
  - kind: ServiceAccount
    name: priva-control-panel
    namespace: priva-cloud
