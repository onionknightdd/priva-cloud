{{- $ns := include "priva-cloud.namespace" . -}}
# control-panel — brain/EPP (:9000 ext_proc) + HTTP faces/SPAs (:8080).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-panel
  namespace: {{ $ns }}
  labels:
    app: control-panel
    {{- include "priva-cloud.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.services.controlPanel.replicas }}
  selector:
    matchLabels: {app: control-panel}
  template:
    metadata:
      labels: {app: control-panel}
    spec:
      serviceAccountName: priva-control-panel
      containers:
        - name: control-panel
          image: {{ include "priva-cloud.image" (dict "svc" .Values.services.controlPanel "root" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "priva_control_panel"]
          ports:
            - {containerPort: 8080, name: http}
            - {containerPort: 9000, name: extproc}
          env:
            - {name: CONTROL_PANEL_HOST, value: "0.0.0.0"}
            - {name: CONTROL_PANEL_PORT, value: "8080"}
            - {name: PRIVA_SERVER__WORK_DIR, value: {{ .Values.controlPanel.workDir | quote }}}
          envFrom:
            - configMapRef: {name: {{ .Values.config.name }}}
            - secretRef: {name: {{ .Values.sharedSecret.name }}}
          {{- with .Values.controlPanel.resources }}
          resources: {{ toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet: {path: /health, port: 8080}
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: control-panel
  namespace: {{ $ns }}
  labels:
    {{- include "priva-cloud.labels" . | nindent 4 }}
spec:
  selector: {app: control-panel}
  ports:
    - {port: 8080, targetPort: 8080, name: http}
    # ext_proc EPP. NOTE: agentgateway dials the InferencePool EndpointPicker over
    # TLS (GIE convention) regardless of appProtocol, so the EPP server (extproc.py)
    # serves TLS (self-signed, ALPN h2; gateway skip-verifies in-cluster). appProtocol
    # is left as a hint and is effectively ignored for the EPP dial.
    - {port: 9000, targetPort: 9000, name: extproc, appProtocol: kubernetes.io/h2c}
