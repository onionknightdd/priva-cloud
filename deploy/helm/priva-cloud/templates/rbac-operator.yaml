{{- $ns := include "priva-cloud.namespace" . -}}
# RBAC for the kopf operator (standalone, namespaced).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: priva-operator
  namespace: {{ $ns }}
  labels:
    {{- include "priva-cloud.labels" . | nindent 4 }}
---
# Cluster-scoped read for API/CRD discovery (kopf resolves the AgentTenant resource).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "priva-operator-discovery-%s" $ns }}
  labels:
    {{- include "priva-cloud.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "priva-operator-discovery-%s" $ns }}
  labels:
    {{- include "priva-cloud.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ printf "priva-operator-discovery-%s" $ns }}
subjects:
  - kind: ServiceAccount
    name: priva-operator
    namespace: {{ $ns }}
---
# Namespaced: manage the per-account runtime objects + the CR it reconciles.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: priva-operator
  namespace: {{ $ns }}
  labels:
    {{- include "priva-cloud.labels" . | nindent 4 }}
rules:
  - apiGroups: ["priva.io"]
    resources: ["agenttenants", "agenttenants/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: priva-operator
  namespace: {{ $ns }}
  labels:
    {{- include "priva-cloud.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: priva-operator
subjects:
  - kind: ServiceAccount
    name: priva-operator
    namespace: {{ $ns }}
