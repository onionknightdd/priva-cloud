{{- if .Values.sharedSecret.create }}
{{- $ns := include "priva-cloud.namespace" . -}}
{{- /* Preserve existing values across upgrades; only generate on first install. */ -}}
{{- $existing := (lookup "v1" "Secret" $ns .Values.sharedSecret.name) -}}
{{- $jwt := .Values.sharedSecret.jwtSecret -}}
{{- $hmac := .Values.sharedSecret.apiKeyHmacSecret -}}
{{- if and (not $jwt) $existing -}}{{- $jwt = (index $existing.data "PRIVA_AUTH__JWT_SECRET" | b64dec) -}}{{- end -}}
{{- if and (not $hmac) $existing -}}{{- $hmac = (index $existing.data "PRIVA_DATASPINE__API_KEY_HMAC_SECRET" | b64dec) -}}{{- end -}}
{{- $jwt = $jwt | default (randAlphaNum 64) -}}
{{- $hmac = $hmac | default (randAlphaNum 64) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.sharedSecret.name }}
  namespace: {{ $ns }}
  labels:
    {{- include "priva-cloud.labels" . | nindent 4 }}
  annotations:
    # Generated on first install and preserved on upgrade (lookup). Rotating these
    # invalidates issued JWTs / api-key lookups — set explicit values to pin.
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  PRIVA_AUTH__JWT_SECRET: {{ $jwt | quote }}
  PRIVA_DATASPINE__API_KEY_HMAC_SECRET: {{ $hmac | quote }}
{{- end }}
