{{- if .Values.gateway.enabled }}
{{- $ns := include "priva-cloud.namespace" . -}}
# The single edge. agentgateway provisions a proxy Deployment+Service for this Gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ $ns }}
  labels:
    {{- include "priva-cloud.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: http
      port: {{ .Values.gateway.listenerPort }}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
# The pool of per-account agent-runner pods. Its EndpointPicker is the control-panel
# ext_proc brain (:9000): agentgateway calls it per request and routes to the returned
# x-gateway-destination-endpoint (the woken account's pod).
apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: {{ .Values.gateway.inferencePoolName }}
  namespace: {{ $ns }}
  labels:
    {{- include "priva-cloud.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: agent-runner
  targetPorts:
    - number: {{ .Values.gateway.runnerTargetPort }}
  endpointPickerRef:
    group: ""
    kind: Service
    name: control-panel
    port:
      number: 9000
    failureMode: FailClose
---
# Runtime prefixes -> InferencePool (EPP steers to the account's pod); everything else
# (SPAs, auth, admin, config) -> control-panel HTTP face. Most-specific path wins.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: priva-routes
  namespace: {{ $ns }}
  labels:
    {{- include "priva-cloud.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  rules:
    - matches:
        # Per-account readiness + first-page bootstrap (returns the workspace).
        - path: {type: PathPrefix, value: /api/health}
        - path: {type: PathPrefix, value: /api/agent}
        - path: {type: PathPrefix, value: /api/files}
        - path: {type: PathPrefix, value: /api/user/files}
        # Per-user agent-runtime state derived from the account's /workspace.
        - path: {type: PathPrefix, value: /api/user/overview}
        - path: {type: PathPrefix, value: /api/user/stats}
        - path: {type: PathPrefix, value: /api/user/analytics}
        - path: {type: PathPrefix, value: /api/user/audit}
        # Per-user config lives in the account's workspace .priva.user.yml.
        - path: {type: PathPrefix, value: /api/resource/quickactions}
        - path: {type: PathPrefix, value: /api/resource/vision-model}
        # skills / mcp / skill-hub are agent-runner routers too (per-account).
        - path: {type: PathPrefix, value: /api/resource/skills}
        - path: {type: PathPrefix, value: /api/resource/mcp}
        - path: {type: PathPrefix, value: /api/resource/skill-hub}
        - path: {type: PathPrefix, value: /api/pty}
        - path: {type: PathPrefix, value: /api/hooks}
        - path: {type: PathPrefix, value: /api/subagents}
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: {{ .Values.gateway.inferencePoolName }}
    - matches:
        - path: {type: PathPrefix, value: /}
      backendRefs:
        - name: control-panel
          port: 8080
{{- end }}
