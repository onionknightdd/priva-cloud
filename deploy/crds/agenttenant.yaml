apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agenttenants.priva.io
spec:
  group: priva.io
  scope: Namespaced
  names:
    plural: agenttenants
    singular: agenttenant
    kind: AgentTenant
    shortNames: [at]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Account
          type: string
          jsonPath: .spec.accountId
        - name: Runner
          type: string
          jsonPath: .spec.agentRunnerType
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: PodIP
          type: string
          jsonPath: .status.podIP
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [accountId]
              properties:
                accountId: {type: string}
                username: {type: string}
                desiredState:
                  type: string
                  enum: [active, offboarding, purge]
                  default: active
                image: {type: string}
                agentRunnerType:
                  type: string
                  enum: [auto_scale, persistent]
                  default: auto_scale
                resources:
                  type: object
                  properties:
                    cpu: {type: number}        # cores; fractional allowed (e.g. 0.5)
                    memoryMb: {type: integer}  # interpreted as Mi by the operator
                storageGb: {type: integer}     # per-account volume quota in Gi (backend-enforced; shrink allowed)
                idle:
                  type: object
                  properties:
                    graceSeconds: {type: integer}
                    minAliveAfterWakeSeconds: {type: integer}
                concurrency:
                  type: object
                  properties:
                    maxConcurrentSessions: {type: integer}
                wake:
                  type: object
                  properties:
                    requestedAt: {type: string}
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
