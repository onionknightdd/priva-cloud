# control-panel — brain/EPP (:9000 ext_proc) + HTTP faces/SPAs (:8080).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-panel
  namespace: priva-cloud
  labels: {app: control-panel}
spec:
  replicas: 1
  selector:
    matchLabels: {app: control-panel}
  template:
    metadata:
      labels: {app: control-panel}
    spec:
      serviceAccountName: priva-control-panel
      containers:
        - name: control-panel
          image: priva/control-panel:dev
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "priva_control_panel"]
          ports:
            - {containerPort: 8080, name: http}
            - {containerPort: 9000, name: extproc}
          env:
            - {name: CONTROL_PANEL_HOST, value: "0.0.0.0"}
            - {name: CONTROL_PANEL_PORT, value: "8080"}
            - {name: PRIVA_SERVER__WORK_DIR, value: "/tmp/cp-workspace"}
          envFrom:
            - configMapRef: {name: priva-config}
            - secretRef: {name: priva-shared-secret}
          readinessProbe:
            httpGet: {path: /health, port: 8080}
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: control-panel
  namespace: priva-cloud
spec:
  selector: {app: control-panel}
  ports:
    - {port: 8080, targetPort: 8080, name: http}
    # ext_proc EPP. NOTE: agentgateway dials the InferencePool EndpointPicker over
    # TLS (GIE convention) regardless of appProtocol, so the EPP server (extproc.py)
    # serves TLS (self-signed, ALPN h2; gateway skip-verifies in-cluster). appProtocol
    # is left as a hint and is effectively ignored for the EPP dial.
    - {port: 9000, targetPort: 9000, name: extproc, appProtocol: kubernetes.io/h2c}
