syntax = "proto3";

package priva.dataplane.v1;

import "priva_common/dataplane/v1/common.proto";

// secret — per-account credential bundle (ANTHROPIC_* env etc.). Stored
// Fernet-encrypted at the single writer; `bundle` rides as a JSON string,
// DECRYPTED on read (the operator injects it as a per-pod K8s Secret at wake).
// Alpha: single shared Fernet key; per-account DEK + KMS unwrap deferred.
message Secret {
  string account_id = 1;
  string bundle = 2;        // JSON object string {ANTHROPIC_AUTH_TOKEN: ...}; decrypted on read
  int64 generation = 3;     // monotonic; bumped on every put
  string updated_at = 4;
}

message PutSecretRequest {
  string account_id = 1;
  string bundle = 2;        // plaintext JSON object string; server encrypts
}

message GetSecretRequest { string account_id = 1; }
message SecretAccountList { repeated string account_ids = 1; }

service SecretService {
  rpc PutSecret(PutSecretRequest) returns (Secret);
  rpc GetSecret(GetSecretRequest) returns (Secret);   // bundle decrypted; empty account_id when absent
  rpc ListSecrets(Empty) returns (SecretAccountList);
}
